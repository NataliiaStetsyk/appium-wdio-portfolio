name: Mobile CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mobile-tests:
    runs-on: ubuntu-latest
    env:
      SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
      SAUCE_ACCESS_KEY: ${{ secrets.SAUCE_ACCESS_KEY }}
      SAUCE_REGION: ${{ secrets.SAUCE_REGION || 'us-west-1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Validate feature/step wiring
        run: npm run test:ci

      # Sauce Labs runs the app from its own App Storage, so the APK has to be
      # uploaded before a session can reference it. Skipped when secrets
      # aren't configured (e.g. forked PRs), in which case test:sauce below
      # falls back to validation-only automatically.
      - name: Upload Android app to Sauce Labs
        if: ${{ env.SAUCE_USERNAME != '' && env.SAUCE_ACCESS_KEY != '' }}
        run: |
          curl -sf -u "$SAUCE_USERNAME:$SAUCE_ACCESS_KEY" \
            -X POST "https://api.${SAUCE_REGION}.saucelabs.com/v1/storage/upload" \
            -F "payload=@apps/android/SwagLabs.apk" \
            -F "name=SauceLabs.apk"

      - name: Run mobile tests on Sauce Labs (Android)
        run: npm run test:sauce

      # Simulator .app builds don't need code signing (unlike real devices),
      # so Sauce's iOS Simulator cloud can run the exact same build validated
      # locally. Pinned to the same 2.7.1 release used in apps/ios/README.md.
      - name: Download iOS Simulator app
        if: ${{ env.SAUCE_USERNAME != '' && env.SAUCE_ACCESS_KEY != '' }}
        run: |
          curl -sfL "https://github.com/saucelabs/sample-app-mobile/releases/download/2.7.1/iOS.Simulator.SauceLabs.Mobile.Sample.app.2.7.1.zip" \
            -o /tmp/SwagLabs.app.zip

      - name: Upload iOS app to Sauce Labs
        if: ${{ env.SAUCE_USERNAME != '' && env.SAUCE_ACCESS_KEY != '' }}
        run: |
          curl -sf -u "$SAUCE_USERNAME:$SAUCE_ACCESS_KEY" \
            -X POST "https://api.${SAUCE_REGION}.saucelabs.com/v1/storage/upload" \
            -F "payload=@/tmp/SwagLabs.app.zip" \
            -F "name=SauceLabs.app.zip"

      - name: Run mobile tests on Sauce Labs (iOS)
        if: always()
        env:
          PLATFORM_NAME: iOS
        run: npm run test:sauce

      - name: Generate Allure report
        if: always()
        run: npm run report:generate

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report
          retention-days: 30
